<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <link rel="stylesheet" href="{% static 'polls/style.css' %}">
    <title>{% block title %}Fancy little polls <3{% endblock %}</title>
</head>

<body>
    <header id="sidebar">
        {% block sidebar %}
        <ul>
            <li><a href="{% url 'polls:index' %}">Home</a></li>
            <li><a href="{% url 'polls:all' %}">All</a></li>

            {% if not user.is_authenticated %}
            <li><a href="/accounts/login">Login</a></li>
            {% else %}
            <li><form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit"
                        style="background:none;text-decoration:underline;border:none;color:#E8C1C1;cursor:pointer;">
                    Logout</button>
            </form></li>
            {% endif %}
        </ul>
        {% endblock %}
    </header>

    <main id="content">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
